<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affican Digital | Communauté</title>
<link rel="stylesheet" href="assets/css/style.css">

<style>
.chat-wrapper{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:60px 20px;
}

.chat-card{
    max-width:750px;
    width:100%;
    padding:70px 45px;
    border-radius:20px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(14px);
    text-align:center;
}

.chat-card h1{
    font-size:36px;
    margin-bottom:20px;
}

.chat-card p{
    font-size:18px;
    opacity:.8;
    line-height:1.7;
    margin-bottom:40px;
}

.discord-btn{
    display:inline-block;
    padding:18px 40px;
    font-size:18px;
    font-weight:600;
    border-radius:50px;
    text-decoration:none;
    background:#5865F2;
    color:#fff;
    transition:.3s ease;
}

.discord-btn:hover{
    transform:translateY(-4px);
    box-shadow:0 20px 50px rgba(88,101,242,.35);
}

.chat-note{
    margin-top:25px;
    font-size:14px;
    opacity:.6;
}
</style>
</head>
<body>

<section class="chat-wrapper">
    <div class="chat-card">

        <h1>Affican Digital Private Community</h1>

        <p>
        Cette communauté est réservée aux membres engagés.
        L’accès nécessite un compte Discord actif.
        </p>

        <!-- ضع رابطك الدائم هنا -->
        <a href="https://discord.gg/UFYJWWzRn
           target="_blank"
           class="discord-btn">
           🚀 Rejoindre la communauté
        </a>

        <div class="chat-note">
            Inscription via Discord obligatoire.
        </div>

    </div>
</section>

</body>
</html>
