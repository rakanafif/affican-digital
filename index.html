<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google-site-verification" content="mkq-KhrCe0g-YogPX614apmXV8QX1RCzn4gDTfRXRYM" />
    <meta name="google-site-verification" content="ISTTmgUKRQYc-Rd8a2pWmf-aBauQiLoEiOgYA6_pxWcs" />
    <title>Affican Digital | رصد الكيان</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #050505; color: #ffffff; font-family: sans-serif; line-height: 1.6; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { background: #000; border: 1px solid #333; padding: 40px 20px; border-radius: 15px; text-align: center; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .pill { color: #ff9d00; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        h1 { color: #ff9d00; font-size: 1.8rem; margin-bottom: 15px; font-weight: bold; }
        p { font-size: 0.95rem; color: #ccc; margin-bottom: 30px; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .btn { display: block; padding: 15px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s; font-size: 1rem; }
        .btn-primary { background-color: #ff9d00; color: #000; border: none; }
        .btn-outline { border: 1px solid #ff9d00; color: #ff9d00; }
    </style>
</head>
<body>
    <div class="card">
        <span class="pill">وكالة رقمية • رصد الكيان</span>
        <h1>Affican Digital</h1>
        <p>رصد التحولات المادية وتثبيت الأثر الرقمي. نحن نحول الركود المادي إلى سيولة رقمية تخترق الفراغ.</p>
        <div class="btn-group">
            <a href="#" class="btn btn-primary">ابدأ الرصد الآن</a>
            <a href="#" class="btn btn-outline">استعرض الخدمات</a>
        </div>
    </div>
</body>
</html>
