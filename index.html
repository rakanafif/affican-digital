<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affican Digital | Premium Solutions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="glass-nav">
        <div class="container nav-content">
            <div class="brand">
                <img src="logo.png" alt="Affican Digital" class="logo">
            </div>
            <ul class="nav-links" id="main-nav">
                </ul>
            <a href="#contact" class="btn-premium" id="nav-cta">تواصل معنا</a>
        </div>
    </nav>

    <header class="hero-premium">
        <div class="container hero-inner">
            <span class="badge-tag" id="hero-badge">التميز الرقمي</span>
            <h1 id="hero-title">Affican Digital</h1>
            <p id="hero-desc" class="lead-text"></p>
            <div class="hero-btns" id="hero-actions">
                </div>
        </div>
    </header>

    <section id="books" class="section">
        <div class="container">
            <div class="sec-header">
                <h2 id="books-title">المتجر الحصري</h2>
                <p id="books-subtitle">مؤلفات تجمع بين الفكر والاحتراف</p>
            </div>
            <div id="books-grid" class="grid-layout">
                </div>
        </div>
    </section>

    <section id="services" class="section section-alt">
        <div class="container">
            <div class="sec-header">
                <h2>خدماتنا الاستراتيجية</h2>
            </div>
            <div id="services-grid" class="grid-layout">
                </div>
        </div>
    </section>

    <img src="logo.png" alt="Affican Digital" class="footer-logo-fixed">

    <script src="script.js"></script>
</body>
</html>
