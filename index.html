<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affican Digital | حلول رقمية احترافية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="glass-nav">
        <div class="container nav-content">
            <div class="brand">
                <img src="logo.png" alt="Affican Digital" class="logo">
            </div>
            <ul class="nav-links">
                <li><a href="#services">الخدمات</a></li>
                <li><a href="#books">المتجر</a></li>
                <li><a href="#contact">تواصل</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero-premium">
        <div class="container hero-inner">
            <span class="badge-tag">التحول الرقمي المتقن</span>
            <h1>Affican Digital Solutions</h1>
            <p id="hero-desc" class="lead-text">جاري تحميل المحتوى...</p>
            <div class="hero-btns">
                <a href="#books" class="btn-main">استعرض الكتب</a>
                <a href="#contact" class="btn-premium">اطلب استشارة</a>
            </div>
        </div>
    </header>

    <section id="books" class="section">
        <div class="container">
            <div class="sec-header">
                <h2>إصداراتنا الحصرية</h2>
                <p>مؤلفات تجمع بين الحكمة والاحتراف الرقمي</p>
            </div>
            <div id="books-grid" class="grid-layout">
                </div>
        </div>
    </section>

    <section id="services" class="section section-alt">
        <div class="container">
            <div class="sec-header">
                <h2>خدماتنا</h2>
            </div>
            <div id="services-grid" class="grid-layout">
                </div>
        </div>
    </section>

    <img src="logo.png" alt="Affican Digital" class="footer-logo-fixed">

    <script src="script.js"></script>
</body>
</html>
