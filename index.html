<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Affican Digital Solutions</title>
  <style>
    :root { --bg: #070a10; --card: #0f172a; --text: #e5e7eb; --primary: #ff8c00; --line: rgba(255,255,255,.10); }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; text-align: right; }
    .container { max-width: 1120px; margin: 0 auto; padding: 0 18px; }
    header { padding: 15px 0; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px 0; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 20px; text-align: center; }
    /* إطار الصورة */
    .img-box { width: 100%; height: 400px; background: #111; border-radius: 12px; overflow: hidden; margin-bottom: 15px; }
    .img-box img { width: 100%; height: 100%; object-fit: cover; }
    .btn { background: var(--primary); color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; font-weight: bold; display: inline-block; }
  </style>
</head>
<body>
  <header class="container">
    <h2 style="color:var(--primary); margin:0;">Affican Digital</h2>
    <img src="logo.png" style="height:40px;" alt="Logo">
  </header>

  <section class="container">
    <h2 style="text-align:center; margin: 40px 0;">متجر الكتب</h2>
    <div class="grid">
      <div class="card">
        <div class="img-box"><img src="millionaire.png" alt="عقلية المليونير"></div>
        <h3>عقلية المليونير</h3>
        <a class="btn" href="https://wa.me/213542961475?text=شراء كتاب عقلية المليونير">4.99$ | شراء</a>
      </div>
      <div class="card">
        <div class="img-box"><img src="abyss.png" alt="الهاوية"></div>
        <h3>الهاوية</h3>
        <a class="btn" href="https://wa.me/213542961475?text=شراء كتاب الهاوية">4.99$ | شراء</a>
      </div>
      <div class="card">
        <div class="img-box"><img src="idealism.png" alt="المثالية"></div>
        <h3>المثالية</h3>
        <a class="btn" href="https://wa.me/213542961475?text=شراء كتاب المثالية">4.99$ | شراء</a>
      </div>
    </div>
  </section>
</body>
</html>
