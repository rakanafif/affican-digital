<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affican Digital | Premium Experience</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="nav-bar">
        <div class="nav-container">
            <img src="logo.png" class="nav-logo" alt="Logo">
            <div class="nav-links">
                <a href="#books">المؤلفات</a>
                <a href="#services">الخدمات</a>
                <a href="#contact" class="nav-cta">ابدأ رحلتك</a>
            </div>
        </div>
    </nav>

    <section class="hero-split">
        <div class="hero-text-side">
            <div class="reveal-content">
                <span class="eyebrow">Affican Digital Biz Solutions</span>
                <h1 id="hero-title">نصمم المستقبل، لا مجرد منصات.</h1>
                <p id="hero-desc" class="subheadline">حيث تلتقي حكمة العقل بنبض الحقيقة في فضاء رقمي لا يعرف الحدود.</p>
                <div class="hero-actions">
                    <a href="#books" class="btn-solid">اكتشف المتجر</a>
                    <a href="#services" class="btn-outline">خدماتنا</a>
                </div>
            </div>
        </div>
        <div class="hero-image-side">
            <div class="hero-image-overlay"></div>
        </div>
    </section>

    <section id="books" class="books-section">
        <div class="container">
            <div class="section-title">
                <h2>المكتبة الحصرية</h2>
                <div class="title-line"></div>
            </div>
            <div id="books-grid" class="books-display">
                </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
