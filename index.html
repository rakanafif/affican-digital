<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affican Digital | المتجر الرسمي</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="glass-header">
        <div class="container nav-row">
            <img src="logo.png" alt="Affican Digital" class="logo">
            <nav>
                <a href="#books-section">المتجر</a>
                <a href="#contact" class="btn-sm">تواصل</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero-digital">
            <div class="container">
                <span class="badge-hero" id="brand-slogan"></span>
                <h1 id="hero-title">Affican Digital Solutions</h1>
                <p class="lead">صناعة الأثر الرقمي ورصد التحولات المادية باحترافية عالمية.</p>
            </div>
        </section>

        <section id="books-section" class="section">
            <div class="container">
                <h2 class="section-title">إصدارات راكان عفيف</h2>
                <div class="books-grid" id="books-container">
                    </div>
            </div>
        </section>
    </main>

    <script src="config.js"></script>
    <script src="main.js"></script>
</body>
</html>
