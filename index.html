<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affican Digital | Global Solutions</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="glass-nav">
        <div class="container nav-flex">
            <img src="logo.png" class="logo" id="site-logo">
            <nav class="desktop-menu">
                <a href="#services">الخدمات</a>
                <a href="#books">الكتب</a>
                <a href="#contact" class="btn-cta">تواصل الآن</a>
            </nav>
        </div>
    </header>

    <section class="hero-global">
        <div class="hero-bg-effects"></div>
        <div class="container hero-inner">
            <span class="badge-top" id="hero-slogan"></span>
            <h1 id="hero-title"></h1>
            <p class="lead" id="hero-desc"></p>
            <div class="cta-group" id="hero-btns"></div>
        </div>
    </section>

    <section id="services" class="section">
        <div class="container">
            <h2 class="section-title">خدماتنا الاحترافية</h2>
            <div class="grid-dynamic" id="services-container"></div>
        </div>
    </section>

    <section id="books" class="section alt-bg">
        <div class="container">
            <h2 class="section-title">إصداراتنا</h2>
            <div class="grid-dynamic" id="books-container"></div>
        </div>
    </section>

    <script src="config.js"></script>
    <script src="main.js"></script>
</body>
</html>
