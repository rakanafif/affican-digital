
<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Affican Digital</title>
    <style>
        body { background: #030509; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .box { background: #0b1120; padding: 40px; border-radius: 20px; border: 1px solid #ff8c00; width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: white; outline: none; }
        button { width: 100%; padding: 12px; background: #ff8c00; border: none; border-radius: 8px; color: white; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Accès Auteurs</h2>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Mot de passe" required>
        <button onclick="window.location.href='register.html'">Se connecter</button>
        <a href="index.html" style="color: #00bfff; display: block; margin-top: 15px; font-size: 0.8rem; text-decoration: none;">Retour</a>
    </div>
</body>
</html>
